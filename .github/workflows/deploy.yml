name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ux-chats-app/package-lock.json

      - run: npm ci
        working-directory: ux-chats-app
      - run: npm run build
        working-directory: ux-chats-app
      - run: touch dist/.nojekyll
        working-directory: ux-chats-app

      - uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ux-chats-app/dist

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
